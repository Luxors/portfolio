name: Deploy Fooseshoes

on:
  push:
    branches: [main]
    paths:
      - 'portfolio/fooseshoes/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          path: portfolio/fooseshoes
          node-version: 20

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
